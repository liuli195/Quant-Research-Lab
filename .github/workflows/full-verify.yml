name: Full Verify

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-verify:
    name: Full Verify
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OpenSpec
        run: npm install -g @fission-ai/openspec@1.4.1

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Configure Windows test environment
        shell: pwsh
        run: |
          tzutil.exe /s "China Standard Time"
          .\.venv\Scripts\python.exe -m playwright install chromium

      - name: Run full verification
        shell: pwsh
        run: .\.venv\Scripts\python.exe .\.build-and-verify\runtime\build_and_verify.py verify --project . --full
